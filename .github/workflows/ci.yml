name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check:versions
      - run: npm test

  rust:
    name: Rust (check + clippy + fmt + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  python:
    name: Python sidecar (import + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r sidecar/requirements.txt
      - run: pip install pytest
      - run: python -c "import sidecar.ai_client; print('sidecar OK')"
        working-directory: .
      - run: pytest sidecar/tests/ -v

  # Defense against accidental secret commits.
  #
  # Why trufflehog (over gitleaks-action): gitleaks-action requires a paid
  # license on private repos. Trufflehog OSS is free, validates findings
  # against live APIs (`--only-verified`), and the action is maintained by
  # the original authors.
  #
  # Scope: diff range only (not full history). The action's built-in logic
  # picks the right SHAs from the event payload — `event.before`/`sha` for
  # push, `pull_request.base.sha`/`head.sha` for PR. We deliberately do NOT
  # pass `base`/`head` inputs ourselves: passing `base: main, head: HEAD`
  # on a push to main resolves both to the same SHA (the just-pushed
  # commit), and the action errors with "BASE and HEAD commits are the
  # same" — see CI run 25551468627 on 2026-05-08. Letting the action
  # default kicks the right SHA for each event automatically.
  secrets:
    name: Secret scanning (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so trufflehog can walk the diff range. `0` = full clone.
          fetch-depth: 0
      - name: Trufflehog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          # `--only-verified` keeps noise low — only secrets that successfully
          # authenticate against their provider's API are reported. Fake keys
          # in test fixtures are filtered out automatically.
          extra_args: --only-verified
